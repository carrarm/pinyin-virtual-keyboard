<main>
  <div class="device mobile">
    <p class="title">Mobile</p>
    <label for="mobile-input">Text:</label>
    <input id="mobile-input" [(ngModel)]="mobileValue" />
    <pinyin-virtual-keyboard [(value)]="mobileValue" anchor="container" />
  </div>

  <div class="device tablet-landscape">
    <p class="title">Tablet Landscape</p>
    <label for="tablet-landscape-input">Text:</label>
    <input id="tablet-landscape-input" [(ngModel)]="landscapeValue" />
    <pinyin-virtual-keyboard [(value)]="landscapeValue" anchor="container" />
  </div>

  <div class="device tablet-portrait">
    <p class="title">Tablet Portrait</p>
    <label for="tablet-portrait-input">Text:</label>
    <input id="tablet-portrait-input" [(ngModel)]="portraitValue" />
    <pinyin-virtual-keyboard [(value)]="portraitValue" anchor="container" />
  </div>
</main>
